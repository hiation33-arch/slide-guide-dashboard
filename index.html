<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해보는 언니 — 슬라이드 가이드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f9f9f9; padding: 2rem 1.5rem; }

.db-wrap { max-width: 960px; margin: 0 auto; }
.db-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
.db-title { font-size: 22px; font-weight: 600; color: #1a1a1a; }
.db-subtitle { font-size: 13px; color: #888; margin-top: 4px; }

.copy-btn-main {
  background: #C4956A; color: #fff; border: none; border-radius: 8px;
  padding: 10px 20px; font-size: 13px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
  opacity: 0.4; transition: opacity 0.2s, transform 0.1s; font-family: inherit;
}
.copy-btn-main.active { opacity: 1; }
.copy-btn-main:active { transform: scale(0.97); }

.storage-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; color: #999; background: #f0f0f0;
  padding: 3px 10px; border-radius: 20px; margin-top: 6px;
}
.storage-dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; }
.storage-dot.ok { background: #5db872; }

.status-bar {
  display: flex; gap: 1rem; align-items: center;
  padding: 10px 14px; background: #f0f0f0;
  border-radius: 8px; margin-bottom: 1.5rem;
  font-size: 13px; color: #666;
}
.status-item { display: flex; align-items: center; gap: 6px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
.status-dot.selected { background: #C4956A; }
.status-sep { color: #ccc; }
.status-hint { margin-left: auto; font-size: 12px; color: #aaa; }

.section { margin-bottom: 1.5rem; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.section-title { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.section-hint { font-size: 12px; color: #aaa; }

.purpose-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.purpose-card {
  border: 1px solid #e5e5e5; border-radius: 12px;
  padding: 14px 16px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
  background: #fff;
}
.purpose-card:hover { border-color: #C4956A; background: #FDF7F2; }
.purpose-card.selected { border-color: #C4956A; background: #FDF7F2; border-width: 2px; }
.purpose-badge { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.badge-label { font-size: 11px; font-weight: 500; color: #C4956A; background: #F7EDE0; padding: 2px 8px; border-radius: 20px; }
.badge-count { font-size: 11px; color: #aaa; }
.purpose-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.purpose-desc { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 10px; }
.purpose-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag { font-size: 11px; color: #666; background: #f5f5f5; padding: 2px 8px; border-radius: 20px; border: 1px solid #e5e5e5; }
.tag.mood { color: #5B7FA6; background: #EEF3F9; border-color: #C5D5E8; }

.main-grid { display: grid; grid-template-columns: 1fr 220px; gap: 16px; }

.set-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.set-card {
  border: 1px solid #e5e5e5; border-radius: 8px;
  padding: 10px; cursor: pointer; transition: border-color 0.15s;
  background: #fff;
}
.set-card:hover { border-color: #C4956A; }
.set-card.selected { border-color: #C4956A; border-width: 2px; }
.set-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
.set-num { font-size: 10px; color: #aaa; margin-bottom: 2px; }
.set-name { font-size: 12px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
.set-desc { font-size: 11px; color: #888; line-height: 1.4; }

.palette-list { display: flex; flex-direction: column; gap: 8px; }
.palette-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border: 1px solid #e5e5e5; border-radius: 8px;
  cursor: pointer; transition: border-color 0.15s; background: #fff;
}
.palette-item:hover { border-color: #C4956A; }
.palette-item.selected { border-color: #C4956A; border-width: 2px; }
.palette-swatches { display: flex; gap: 3px; }
.swatch { width: 14px; height: 14px; border-radius: 3px; }
.palette-info { flex: 1; }
.palette-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
.palette-use { font-size: 11px; color: #888; }
.palette-radio { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #ccc; flex-shrink: 0; }
.palette-item.selected .palette-radio { background: #C4956A; border-color: #C4956A; }

.divider { border: none; border-top: 1px solid #e5e5e5; margin: 1.5rem 0; }

.ref-zone {
  border: 2px dashed #ccc; border-radius: 12px;
  padding: 2rem; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: #f9f9f9; margin-bottom: 12px;
}
.ref-zone:hover { border-color: #C4956A; background: #FDF7F2; }
.ref-zone-text { font-size: 13px; color: #888; }
.ref-zone-sub { font-size: 12px; color: #aaa; margin-top: 4px; }

.ref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.ref-card { border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; background: #fff; }
.ref-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.ref-body { padding: 8px 10px; }
.ref-memo { font-size: 11px; color: #666; margin-bottom: 6px; width: 100%; border: 1px solid #e5e5e5; border-radius: 4px; padding: 4px 6px; background: #f9f9f9; resize: none; font-family: inherit; }
.ref-actions { display: flex; gap: 6px; }
.ref-gen-btn { flex: 1; font-size: 11px; padding: 5px 0; border-radius: 4px; border: 1px solid #C4956A; color: #C4956A; background: transparent; cursor: pointer; font-family: inherit; }
.ref-gen-btn:hover { background: #FDF7F2; }
.ref-gen-btn:disabled { color: #aaa; border-color: #ddd; cursor: default; }
.ref-del-btn { font-size: 11px; padding: 5px 8px; border-radius: 4px; border: 1px solid #e5e5e5; color: #aaa; background: transparent; cursor: pointer; font-family: inherit; }
.ref-del-btn:hover { border-color: #e55; color: #e55; }
.ref-prompt-box { font-size: 11px; line-height: 1.5; color: #666; background: #f9f9f9; border: 1px solid #e5e5e5; border-radius: 4px; padding: 6px 8px; margin-top: 6px; white-space: pre-wrap; word-break: break-all; }
.ref-prompt-copy { width: 100%; margin-top: 5px; font-size: 11px; padding: 5px; border-radius: 4px; border: 1px solid #C4956A; color: #C4956A; background: transparent; cursor: pointer; font-family: inherit; }
.ref-prompt-copy:hover { background: #FDF7F2; }

.spinner { display: inline-block; width: 10px; height: 10px; border: 1.5px solid #ddd; border-top-color: #C4956A; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #2C2C2C; color: #fff; padding: 10px 20px; border-radius: 8px;
  font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 99;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="db-wrap">
  <div class="db-header">
    <div>
      <div class="db-title">해보는 언니 — 슬라이드 가이드</div>
      <div class="db-subtitle">용도 → 세트 → 팔레트 순으로 선택하면 Claude용 슬라이드 제작 가이드가 한 번에 복사돼요.</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;">
      <button class="copy-btn-main" id="mainCopyBtn" onclick="copyAll()">📋 용도 + 세트 + 팔레트 복사</button>
      <div class="storage-badge"><div class="storage-dot" id="storageDot"></div><span id="storageLabel">저장소 연결 중...</span></div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item"><div class="status-dot" id="dot1"></div><span id="st1">용도 선택 안 됨</span></div>
    <span class="status-sep">|</span>
    <div class="status-item"><div class="status-dot" id="dot2"></div><span id="st2">세트 선택 안 됨</span></div>
    <span class="status-sep">|</span>
    <div class="status-item"><div class="status-dot" id="dot3"></div><span id="st3">팔레트 선택 안 됨</span></div>
    <span class="status-hint">셋 다 선택하면 복사 버튼이 활성화돼요</span>
  </div>

  <div class="section">
    <div class="section-header"><div class="section-title">용도 선택</div><div class="section-hint">클릭해서 선택</div></div>
    <div class="purpose-grid" id="purposeGrid"></div>
  </div>

  <div class="main-grid">
    <div class="section">
      <div class="section-header"><div class="section-title">슬라이드 세트</div><div class="section-hint">클릭해서 선택</div></div>
      <div class="set-grid" id="setGrid"></div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-title">컬러 팔레트</div></div>
      <div class="palette-list" id="paletteList"></div>
    </div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="section-header">
      <div>
        <div class="section-title">내 레퍼런스 보관함</div>
        <div style="font-size:12px;color:#aaa;margin-top:3px;">마음에 드는 PPT 캡처 이미지를 붙여넣으면 스타일 프롬프트를 자동 생성해드려요.</div>
      </div>
    </div>
    <div class="ref-zone" id="refZone" tabindex="0">
      <div style="font-size:28px;margin-bottom:8px;">📋</div>
      <div class="ref-zone-text">여기를 클릭 후 Ctrl+V로 이미지 붙여넣기</div>
      <div class="ref-zone-sub">캡처한 PPT 이미지를 분석해서 프롬프트를 만들어드려요.</div>
    </div>
    <div class="ref-grid" id="refGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const purposes = [
  { id:'lecture', label:'강의자료', count:'15~25장', title:'강의 슬라이드', desc:'도입 → 이해 → 사례 → 참여 → 정리 흐름. 청중이 따라오도록 리듬감 있는 구성.', sets:['세트 A 추천','세트 E 추천'], moods:['소프트 틸','포레스트 그린'], structure:'Cover → 오프닝 질문 → 오늘의 목표 → 배경 설명(3장) → 핵심 개념(6장) → 사례/시연(4장) → 참여 활동(2장) → 핵심 정리 → Q&A/Closing' },
  { id:'contest', label:'공모전', count:'5~7장', title:'공모전 제출', desc:'짧고 강렬하게. 문제 → 아이디어 → 실행 → 기대효과 → 차별성 순으로 임팩트 있게.', sets:['세트 D 추천','세트 E 추천'], moods:['차콜','더스티 블루'], structure:'Cover → 문제 정의 → 아이디어 소개 → 실행 방식 → 기대 효과 → 차별성/경쟁력 → Closing' },
  { id:'proposal', label:'제안서', count:'10~15장', title:'제안서·사업계획서', desc:'논리성과 데이터 기반 설득. 문제 → 솔루션 → 실행계획 → 기대효과 순으로 타당성 강조.', sets:['세트 C 추천','세트 B 추천'], moods:['더스티 블루','차콜'], structure:'Cover → Executive Summary → 문제 정의 → 시장·환경 분석 → 제안 솔루션 → 실행 계획 → 조직·운영 체계 → 예산·자원 계획 → 기대 효과 → Closing' }
];
const sets = [
  { id:'a', num:'세트 A', name:'미니멀 라인', desc:'타이포그래피 중심, 깔끔한 선', c1:'#F5F5F5', c2:'#E0877B', c3:'#2C2C2C' },
  { id:'b', num:'세트 B', name:'카드 + 아이콘', desc:'보드 위 카드, 입체감', c1:'#3D6B5E', c2:'#E0877B', c3:'#FFFFFF' },
  { id:'c', num:'세트 C', name:'매거진', desc:'세로 사이드바, 정보 테이블', c1:'#5B7FA6', c2:'#E0877B', c3:'#F5F5F5' },
  { id:'d', num:'세트 D', name:'다이나믹', desc:'다크 배경, 대각선 대비', c1:'#1A1A2E', c2:'#E0877B', c3:'#FFFFFF' },
  { id:'e', num:'세트 E', name:'기하학', desc:'도형 패턴, 구조적 느낌', c1:'#F7EDE0', c2:'#C4956A', c3:'#2C2C2C' }
];
const palettes = [
  { id:'mustard', name:'머스터드', use:'채널 · 브랜드 콘텐츠', main:'#C4956A', bg:'#F7EDE0', point:'#E0877B', text:'#2C2C2C' },
  { id:'teal', name:'소프트 틸', use:'세련된 강의 · 포트폴리오', main:'#4A9090', bg:'#E0F0F0', point:'#E0877B', text:'#2C2C2C' },
  { id:'forest', name:'포레스트 그린', use:'평생교육원 · 지역 강의', main:'#3D6B5E', bg:'#E0EDEA', point:'#E0877B', text:'#2C2C2C' },
  { id:'blue', name:'더스티 블루', use:'공공기관 · 디지털배움터', main:'#5B7FA6', bg:'#E0EAF4', point:'#E0877B', text:'#2C2C2C' },
  { id:'charcoal', name:'차콜', use:'공식 제안서 · 공모전', main:'#2C2C2C', bg:'#EFEFEF', point:'#E0877B', text:'#FFFFFF' }
];

let sel = { purpose:null, set:null, palette:null };
let refs = [];

function loadLocal() {
  try {
    const s = localStorage.getItem('haeboneun-sel');
    if (s) { sel = JSON.parse(s); }
    const r = localStorage.getItem('haeboneun-refs');
    if (r) { refs = JSON.parse(r); }
  } catch(e) {}
  renderPurpose(); renderSets(); renderPalettes(); updateStatus(); renderRefs();
}

function saveSel() {
  try { localStorage.setItem('haeboneun-sel', JSON.stringify(sel)); } catch(e) {}
}
function saveRefs() {
  try { localStorage.setItem('haeboneun-refs', JSON.stringify(refs.map(r=>({id:r.id,dataUrl:r.dataUrl,memo:r.memo,prompt:r.prompt})))); } catch(e) {}
}

function makeThumb(s) {
  return `<svg viewBox="0 0 160 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
    <rect width="160" height="90" fill="${s.c1}"/>
    ${s.id==='a'?`<rect x="12" y="28" width="60" height="4" rx="2" fill="${s.c3}" opacity="0.8"/><rect x="12" y="38" width="40" height="3" rx="1.5" fill="${s.c3}" opacity="0.4"/><rect x="12" y="60" width="30" height="2" rx="1" fill="${s.c2}"/><line x1="0" y1="22" x2="160" y2="22" stroke="${s.c2}" stroke-width="1.5"/>`:
    s.id==='b'?`<rect x="10" y="14" width="65" height="62" rx="4" fill="rgba(255,255,255,0.15)"/><rect x="85" y="14" width="65" height="28" rx="4" fill="rgba(255,255,255,0.15)"/><circle cx="30" cy="35" r="8" fill="${s.c2}" opacity="0.9"/>`:
    s.id==='c'?`<rect x="0" y="0" width="35" height="90" fill="#4A6E94"/><rect x="4" y="20" width="27" height="3" rx="1.5" fill="rgba(255,255,255,0.9)"/><rect x="42" y="18" width="100" height="5" rx="2" fill="${s.c3}" opacity="0.8"/>`:
    s.id==='d'?`<polygon points="80,0 160,0 160,90" fill="rgba(255,255,255,0.06)"/><rect x="12" y="28" width="70" height="6" rx="3" fill="${s.c2}"/><circle cx="130" cy="45" r="20" fill="rgba(255,255,255,0.05)" stroke="${s.c2}" stroke-width="1"/>`:
    `<polygon points="0,0 50,0 0,50" fill="${s.c2}" opacity="0.3"/><polygon points="160,90 110,90 160,40" fill="${s.c2}" opacity="0.2"/><rect x="20" y="30" width="70" height="5" rx="2.5" fill="${s.c3}" opacity="0.8"/><circle cx="125" cy="45" r="16" fill="${s.c2}" opacity="0.2"/>`}
  </svg>`;
}

function renderPurpose() {
  document.getElementById('purposeGrid').innerHTML = purposes.map(p=>`
    <div class="purpose-card ${sel.purpose===p.id?'selected':''}" onclick="selectPurpose('${p.id}')">
      <div class="purpose-badge"><span class="badge-label">${p.label}</span><span class="badge-count">${p.count}</span></div>
      <div class="purpose-title">${p.title}</div>
      <div class="purpose-desc">${p.desc}</div>
      <div class="purpose-tags">${p.sets.map(s=>`<span class="tag">${s}</span>`).join('')}${p.moods.map(m=>`<span class="tag mood">${m}</span>`).join('')}</div>
    </div>`).join('');
}
function renderSets() {
  document.getElementById('setGrid').innerHTML = sets.map(s=>`
    <div class="set-card ${sel.set===s.id?'selected':''}" onclick="selectSet('${s.id}')">
      <div class="set-thumb">${makeThumb(s)}</div>
      <div class="set-num">${s.num}</div>
      <div class="set-name">${s.name}</div>
      <div class="set-desc">${s.desc}</div>
    </div>`).join('');
}
function renderPalettes() {
  document.getElementById('paletteList').innerHTML = palettes.map(p=>`
    <div class="palette-item ${sel.palette===p.id?'selected':''}" onclick="selectPalette('${p.id}')">
      <div class="palette-swatches">
        <div class="swatch" style="background:${p.main}"></div>
        <div class="swatch" style="background:${p.bg}"></div>
        <div class="swatch" style="background:${p.point}"></div>
      </div>
      <div class="palette-info"><div class="palette-name">${p.name}</div><div class="palette-use">${p.use}</div></div>
      <div class="palette-radio"></div>
    </div>`).join('');
}

function selectPurpose(id) { sel.purpose=id; renderPurpose(); updateStatus(); saveSel(); }
function selectSet(id) { sel.set=id; renderSets(); updateStatus(); saveSel(); }
function selectPalette(id) { sel.palette=id; renderPalettes(); updateStatus(); saveSel(); }

function updateStatus() {
  const p=purposes.find(x=>x.id===sel.purpose);
  const s=sets.find(x=>x.id===sel.set);
  const pal=palettes.find(x=>x.id===sel.palette);
  document.getElementById('st1').textContent=p?p.title:'용도 선택 안 됨';
  document.getElementById('st2').textContent=s?s.name:'세트 선택 안 됨';
  document.getElementById('st3').textContent=pal?pal.name:'팔레트 선택 안 됨';
  document.getElementById('dot1').className='status-dot'+(p?' selected':'');
  document.getElementById('dot2').className='status-dot'+(s?' selected':'');
  document.getElementById('dot3').className='status-dot'+(pal?' selected':'');
  document.getElementById('mainCopyBtn').className='copy-btn-main'+(p&&s&&pal?' active':'');
}

function buildPrompt() {
  const p=purposes.find(x=>x.id===sel.purpose);
  const s=sets.find(x=>x.id===sel.set);
  const pal=palettes.find(x=>x.id===sel.palette);
  if(!p||!s||!pal) return '';
  return `[해보는 언니 슬라이드 제작 가이드]\n\n■ 용도: ${p.title} (${p.count})\n■ 슬라이드 구성: ${p.structure}\n\n■ 세트: ${s.num} — ${s.name}\n스타일 특징: ${s.desc}\n\n■ 컬러 팔레트: ${pal.name}\n- 메인 컬러: ${pal.main}\n- 배경 패널: ${pal.bg}\n- 포인트(코랄): ${pal.point} — 슬라이드당 1곳만\n- 텍스트: ${pal.text}\n- 추천 용도: ${pal.use}\n\n■ 디자인 원칙\n- 1슬라이드 = 1메시지, 여백 넉넉하게\n- 텍스트 최소화, 키워드 위주\n- 폰트: Pretendard (제목 800 / 본문 400)\n- 코랄(${pal.point})은 슬라이드당 딱 1곳만 사용\n\n위 가이드에 맞춰 HTML 슬라이드를 만들어주세요.`;
}

function copyAll() {
  const text=buildPrompt();
  if(!text) return;
  navigator.clipboard.writeText(text).then(()=>showToast('프롬프트 복사 완료! Claude에 붙여넣기 하세요 ✓'));
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.addEventListener('paste', async(e)=>{
  const items=e.clipboardData?.items;
  if(!items) return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      const file=item.getAsFile();
      const reader=new FileReader();
      reader.onload=(ev)=>addRef(ev.target.result);
      reader.readAsDataURL(file);
      break;
    }
  }
});

function addRef(dataUrl) {
  refs.push({id:Date.now(), dataUrl, memo:'', prompt:null, loading:false});
  saveRefs(); renderRefs();
  showToast('이미지 저장됐어요! 프롬프트 생성 버튼을 눌러보세요.');
}
function removeRef(id) { refs=refs.filter(r=>r.id!==id); saveRefs(); renderRefs(); }

async function generatePrompt(id) {
  const ref=refs.find(r=>r.id===id);
  if(!ref||ref.loading) return;
  ref.loading=true; renderRefs();
  try {
    const base64=ref.dataUrl.split(',')[1];
    const mediaType=ref.dataUrl.split(';')[0].split(':')[1];
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
          {type:'text',text:'이 슬라이드/PPT 이미지의 디자인 스타일을 분석해서, AI에게 "이 스타일로 슬라이드를 만들어달라"고 요청하는 프롬프트를 한국어로 작성해줘. 레이아웃, 색상, 타이포그래피, 구성 요소의 특징을 구체적으로 담아줘. 프롬프트만 출력해줘 (설명 없이).'}
        ]}]
      })
    });
    const data=await res.json();
    ref.prompt=data.content?.[0]?.text||'분석 결과를 가져오지 못했어요.';
  } catch(e) { ref.prompt='오류가 발생했어요. 다시 시도해주세요.'; }
  ref.loading=false; saveRefs(); renderRefs();
}

function updateMemo(id,val) {
  const ref=refs.find(r=>r.id===id);
  if(ref){ref.memo=val; saveRefs();}
}
function copyRefPrompt(id) {
  const ref=refs.find(r=>r.id===id);
  if(ref?.prompt) navigator.clipboard.writeText(ref.prompt).then(()=>showToast('레퍼런스 프롬프트 복사 완료!'));
}

function renderRefs() {
  const g=document.getElementById('refGrid');
  if(!refs.length){g.innerHTML='';return;}
  g.innerHTML=refs.map(r=>`
    <div class="ref-card">
      <img class="ref-img" src="${r.dataUrl}" alt="레퍼런스">
      <div class="ref-body">
        <textarea class="ref-memo" rows="2" placeholder="메모 (선택)" onchange="updateMemo(${r.id},this.value)">${r.memo||''}</textarea>
        <div class="ref-actions">
          <button class="ref-gen-btn" onclick="generatePrompt(${r.id})" ${r.loading?'disabled':''}>
            ${r.loading?'<span class="spinner"></span> 분석 중...':r.prompt?'재생성':'프롬프트 생성'}
          </button>
          <button class="ref-del-btn" onclick="removeRef(${r.id})">🗑</button>
        </div>
        ${r.prompt?`<div class="ref-prompt-box">${r.prompt.substring(0,200)}${r.prompt.length>200?'...':''}</div><button class="ref-prompt-copy" onclick="copyRefPrompt(${r.id})">📋 프롬프트 복사</button>`:''}
      </div>
    </div>`).join('');
}

// localStorage 기반 저장 (Chrome에서 열 때 작동)
document.getElementById('storageDot').className='storage-dot ok';
document.getElementById('storageLabel').textContent='선택 내역 자동 저장됨 (localStorage)';
loadLocal();
</script>
